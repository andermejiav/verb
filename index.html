<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Verb Conjugator</title>
    <meta name="description" content="A beautiful and modern English verb conjugator app.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>English Verb Conjugator</h1>
            <p>Enter an English verb to see its conjugations</p>
        </header>

        <main>
            <form id="conjugator-form" class="search-box">
                <input type="text" id="verb-input" placeholder="e.g., walk, go, eat..." autocomplete="off" required>
                <button type="submit">Conjugate</button>
            </form>

            <div id="search-history" class="history-container hidden">
                <h3>Recent Searches</h3>
                <div id="history-list" class="history-list"></div>
            </div>

            <div id="results" class="results-container hidden">
                <div class="title-container">
                    <h2 id="verb-title"></h2>
                    <button id="translate-btn" class="translate-btn" type="button">Traducir a Español</button>
                    <h3 id="verb-translation" class="verb-translation hidden"></h3>
                </div>
                
                <div class="cards-grid">
                    <div class="card">
                        <h3>Present Simple</h3>
                        <p id="present-tense" class="tense-result"></p>
                    </div>
                    <div class="card">
                        <h3>Past Simple</h3>
                        <p id="past-tense" class="tense-result"></p>
                    </div>
                    <div class="card">
                        <h3>Past Participle</h3>
                        <p id="participle-tense" class="tense-result"></p>
                    </div>
                    <div class="card">
                        <h3>Gerund (Present Participle)</h3>
                        <p id="gerund-tense" class="tense-result"></p>
                    </div>
                </div>
            </div>
            
            <div id="error-message" class="error-message hidden">
                Please enter a valid English verb.
            </div>
        </main>
    </div>

    <!-- Compromise NLP Library -->
    <script src="https://unpkg.com/compromise"></script>
    <script src="app.js"></script>
</body>
</html>
